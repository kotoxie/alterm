name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build release notes
        id: notes
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          # Strip optional v-prefix for correct semver sorting, then find the tag just before the current one
          CURRENT="${{ github.ref_name }}"
          CURRENT_BARE="${CURRENT#v}"
          PREV=$(git tag -l | sed 's/^v//' | sort -t. -k1,1nr -k2,2nr -k3,3nr | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | while read -r t; do
            if [ "$t" != "$CURRENT_BARE" ]; then
              # Find the actual tag name (bare or v-prefixed)
              if git rev-parse "v$t" >/dev/null 2>&1; then echo "v$t"; else echo "$t"; fi
              break
            fi
          done)
          if [ -z "$PREV" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV}..HEAD"
          fi

          # Collect commits by conventional-commit type, strip prefix, title-case the message
          pretty_line() {
            echo "$1" \
              | sed 's/^feat([^)]*): //' \
              | sed 's/^feat: //' \
              | sed 's/^fix([^)]*): //' \
              | sed 's/^fix: //' \
              | sed 's/^perf([^)]*): //' \
              | sed 's/^perf: //' \
              | sed 's/^refactor([^)]*): //' \
              | sed 's/^refactor: //' \
              | python3 -c "import sys; s=sys.stdin.read().rstrip(); print(s[:1].upper()+s[1:]) if s else None"
          }

          FEATS=""
          FIXES=""
          PERF=""
          MISC=""

          while IFS= read -r line; do
            msg="${line#- }"
            if echo "$msg" | grep -qE '^(feat|feature)(\([^)]*\))?:'; then
              FEATS="${FEATS}"$'\n'"- $(echo "$msg" | sed 's/^feat[^:]*: //' | python3 -c "import sys; s=sys.stdin.read().rstrip(); print(s[:1].upper()+s[1:])")"
            elif echo "$msg" | grep -qE '^fix(\([^)]*\))?:'; then
              FIXES="${FIXES}"$'\n'"- $(echo "$msg" | sed 's/^fix[^:]*: //' | python3 -c "import sys; s=sys.stdin.read().rstrip(); print(s[:1].upper()+s[1:])")"
            elif echo "$msg" | grep -qE '^perf(\([^)]*\))?:'; then
              PERF="${PERF}"$'\n'"- $(echo "$msg" | sed 's/^perf[^:]*: //' | python3 -c "import sys; s=sys.stdin.read().rstrip(); print(s[:1].upper()+s[1:])")"
            elif echo "$msg" | grep -qE '^(ci|chore|docs|style|test|build|release)(\([^)]*\))?:'; then
              true  # skip noise
            else
              MISC="${MISC}"$'\n'"- $(echo "$msg" | python3 -c "import sys; s=sys.stdin.read().rstrip(); print(s[:1].upper()+s[1:])")"
            fi
          done < <(git log $RANGE --pretty=format:"- %s" --no-merges || true)

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          EOF_MARKER=$(openssl rand -hex 8)
          echo "body<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo "## ✨ What's New in ${VERSION}" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"

          if [ -n "$FEATS" ]; then
            echo "### 🚀 New Features" >> "$GITHUB_OUTPUT"
            echo "$FEATS" | sed '/^$/d' >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> "$GITHUB_OUTPUT"
            echo "$FIXES" | sed '/^$/d' >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$PERF" ]; then
            echo "### ⚡ Performance" >> "$GITHUB_OUTPUT"
            echo "$PERF" | sed '/^$/d' >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$MISC" ]; then
            echo "### 🔧 Other Changes" >> "$GITHUB_OUTPUT"
            echo "$MISC" | sed '/^$/d' >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$FEATS" ] && [ -z "$FIXES" ] && [ -z "$PERF" ] && [ -z "$MISC" ]; then
            echo "- Minor improvements and bug fixes" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
          fi

          echo "## 🐳 Container Image" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo '```bash' >> "$GITHUB_OUTPUT"
          echo "docker run -d -p 7443:7443 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo '```' >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.notes.outputs.version }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: ${{ steps.notes.outputs.body }}
